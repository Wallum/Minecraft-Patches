name: Build and Release NeoForge Mod

on:
  push:
    branches: ["3-establish-as-mod"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java 21
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 3. Make Gradle wrapper executable
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      # 4. Build (NeoForge uses remapJar)
      - name: Build mod
        run: ./gradlew build remapJar --no-daemon

      # 5. Find built JAR
      - name: Locate built JAR
        id: findjar
        run: |
          JAR_PATH=$(find build -type f -name "*.jar" | grep -v "sources" | head -n 1)
          echo "JAR_PATH=$JAR_PATH" >> $GITHUB_ENV
          echo "Found JAR: $JAR_PATH"

      # 6. Extract version from gradle.properties
      - name: Read mod version
        id: version
        run: |
          VERSION=$(grep "^version=" gradle.properties | cut -d'=' -f2)
          echo "MOD_VERSION=$VERSION" >> $GITHUB_ENV

      # 7. Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.MOD_VERSION }}+${{ github.run_number }}"
          name: "WallumPatches v${{ env.MOD_VERSION }}+${{ github.run_number }}"
          body: |
            Automated NeoForge build for WallumPatches
            Version: ${{ env.MOD_VERSION }}+${{ github.run_number }}
          files: ${{ env.JAR_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
