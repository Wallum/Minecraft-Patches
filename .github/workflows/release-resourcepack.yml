name: Build and Release NeoForge Mod

on:
  push:
    branches: ["3-establish-as-mod"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build mod (NeoForge)
        run: ./gradlew remapJar --no-daemon

      - name: Debug: list build outputs
        run: find build -maxdepth 5 -type f -print

      - name: Locate built JAR
        id: findjar
        run: |
          JAR_PATH=$(find build -type f -name "*.jar" \
            | grep -v "sources" \
            | grep -v "dev" \
            | grep -v "test" \
            | head -n 1)

          if [ -z "$JAR_PATH" ]; then
            echo "No JAR found!"
            exit 1
          fi

          echo "JAR_PATH=$JAR_PATH" >> $GITHUB_ENV
          echo "Found JAR: $JAR_PATH"

      - name: Read mod version
        id: version
        run: |
          VERSION=$(grep "^version=" gradle.properties | cut -d'=' -f2)
          echo "MOD_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.MOD_VERSION }}+${{ github.run_number }}"
          name: "WallumPatches v${{ env.MOD_VERSION }}+${{ github.run_number }}"
          body: |
            Automated NeoForge build for WallumPatches
            Version: ${{ env.MOD_VERSION }}+${{ github.run_number }}
          files: ${{ env.JAR_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
