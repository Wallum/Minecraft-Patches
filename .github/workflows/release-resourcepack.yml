name: Build and Release NeoForge Mod

on:
  push:
    branches: ["3-establish-as-mod"] # or your release branch
  workflow_dispatch: # allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create GitHub releases

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Java 21
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 3️⃣ Make Gradle wrapper executable
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      # 4️⃣ Build the mod
      - name: Build mod
        run: ./gradlew build --no-daemon

      # 5️⃣ Debug: list build artifacts
      - name: List built files
        run: ls -lh build/libs/

      # 6️⃣ Set version for release
      - name: Set release version
        id: version
        run: echo "RELEASE_VERSION=${{ env.MOD_VERSION }}-${{ github.run_number }}" >> $GITHUB_ENV

      # 7️⃣ Create GitHub Release with mod JAR attached
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.RELEASE_VERSION }}"
          name: "WallumPatches v${{ env.RELEASE_VERSION }}"
          body: |
            Automated NeoForge build for WallumPatches
            Version: ${{ env.RELEASE_VERSION }}
          files: build/libs/wallumpatches-${{ env.MOD_VERSION }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOD_VERSION: 3.0.0 # your base mod version
