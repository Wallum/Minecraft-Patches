name: Build NeoForge Mod

on:
  push:
    branches: ["3-establish-as-mod"] # triggers when pushing to this branch
  workflow_dispatch: # allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create releases

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Java 21
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 3️⃣ Ensure Gradle wrapper exists (optional sanity check)
      - name: Check Gradle wrapper
        run: |
          if [ ! -f ./gradlew ]; then
            echo "Gradle wrapper not found! Please commit gradlew and gradle/wrapper/*"
            exit 1
          fi

      # 4️⃣ Build mod with Gradle
      - name: Build mod
        run: ./gradlew build --no-daemon

      # 5️⃣ Upload release
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/3-establish-as-mod' # optional: only release from this branch
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.run_number }}
          name: "WallumPatches ${{ github.run_number }}"
          body: |
            Automated NeoForge build for WallumPatches
            Built on ${{ github.run_number }}
          files: build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
