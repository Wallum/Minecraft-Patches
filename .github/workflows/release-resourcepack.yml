name: Build NeoForge Mod

on:
  push:
    branches: ["main"] # or your main branch
  workflow_dispatch: # allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required for GH release

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Java 21
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 3️⃣ Build mod with Gradle
      - name: Build mod
        run: ./gradlew build

      # 4️⃣ Upload release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.run_number }}
          name: "WallumPatches ${{ github.run_number }}"
          body: |
            Automated NeoForge build for WallumPatches
            Built on ${{ github.run_number }}
          files: build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
